name: Framework CI

on:
  push:
    branches: [main]
    # Tag pushes run the release gate below. Without this the gate could never fire,
    # because a tag push is not a branch push.
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck + tests + isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # Actions economy (CI-ECON-01 §7.1): cache the npm DOWNLOAD cache (~/.npm),
          # keyed automatically on runner OS + hashFiles('**/package-lock.json'). A
          # lockfile change → new hash → new key → guaranteed cache miss + repopulate
          # (no stale/incompatible deps). Caches the download cache, not node_modules.
          cache: 'npm'
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Render tests
        run: npm test
      - name: Division isolation (src must be identity-blank)
        run: npm run isolation
      - name: Release gate (tag builds only)
        # WF-GOV-01. docs/SEMVER-POLICY.md already required release notes on every tag
        # and a compatibility matrix updated every release. Both rules were broken for
        # 12 consecutive tags because nothing checked them. Skips silently on branch
        # and PR builds; fails a tag build that would otherwise ship the same drift.
        run: node scripts/release-gate.mjs
