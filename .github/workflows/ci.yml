name: Framework CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: typecheck + tests + isolation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Render tests
        run: npm test
      - name: Division isolation (src must be identity-blank)
        run: npm run isolation
